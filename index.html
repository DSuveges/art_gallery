<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Artist portfolio — paintings and works on paper">
  <title>Gallery</title>
  <link rel="stylesheet" href="css/style.css">

  <!--
    FILE:// FALLBACK
    If you open this page directly from the filesystem (without a local server),
    Chrome and some other browsers block fetch() on local files.
    In that case, uncomment the line below and keep artworks.js in sync with
    artworks.json (see README for instructions).
  -->
  <!-- <script src="data/artworks.js"></script> -->
</head>
<body>

  <header>
    <h1 class="artist-name">H. I. Adrienne</h1>
    <p class="artist-tagline">Paintings &amp; works on paper</p>
    <nav class="site-nav" aria-label="Site navigation">
      <a href="index.html" class="active" data-i18n="nav_works">Works</a>
      <a href="contact.html" data-i18n="nav_contact">About</a>
    </nav>
    <div class="lang-switch" aria-label="Language">
      <button data-lang="en" title="English">🇬🇧</button>
      <button data-lang="hu" title="Magyar">🇭🇺</button>
    </div>
  </header>

  <nav id="filters" aria-label="Filter by technique">
    <!-- Populated by gallery.js -->
  </nav>

  <main id="gallery" aria-label="Artwork gallery">
    <!-- Populated by gallery.js -->
  </main>

  <footer>
    <p id="enquiries"></p>
    <p id="copyright"></p>
  </footer>

  <!-- Lightbox — rendered once, reused for every artwork -->
  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Artwork detail">
    <div id="lightbox-backdrop"></div>
    <div id="lightbox-panel">
      <button id="lightbox-close" aria-label="Close">&times;</button>
      <button id="lightbox-prev" aria-label="Previous artwork">&#8592;</button>
      <button id="lightbox-next" aria-label="Next artwork">&#8594;</button>

      <div id="lightbox-image-wrap">
        <img id="lightbox-img" src="" alt="">
        <a id="lightbox-zoom" href="#" target="_blank" rel="noopener" aria-label="View full size">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </a>
      </div>

      <div id="lightbox-meta">
        <h2 id="meta-title"></h2>
        <dl id="meta-details"></dl>
        <p id="meta-description"></p>
        <div id="meta-tags" class="tag-list"></div>
        <div id="meta-exhibitions" hidden>
          <h3 id="meta-exhibitions-label" class="contact-label"></h3>
          <ul id="meta-exhibitions-list" class="exhibitions-list"></ul>
        </div>
        <span id="meta-available"></span>
        <a id="meta-enquire" class="enquire-link" href="mailto:"></a>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
